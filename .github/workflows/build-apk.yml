name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Generate Prisma client
        run: npx prisma generate

      - name: Build Next.js
        run: npm run build
        env:
          SENTRY_AUTH_TOKEN: ""
          NEXT_PUBLIC_SENTRY_DSN: ""

      - name: Copy web assets to Capacitor
        run: npx cap copy android

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: retailpos-apk
          path: android/app/build/outputs/apk/debug/*.apk

      - name: Create GitHub Release with APK
        uses: softprops/action-gh-release@v2
        if: github.ref == 'refs/heads/main'
        with:
          tag_name: build-${{ github.run_number }}
          name: RetailPOS v${{ github.run_number }}
          body: |
            ## RetailPOS Android App

            ### Install on Phone
            Download `app-debug.apk` below and install on your Android device.

            ### Install on PC
            Open https://retailpos-sigma.vercel.app in Chrome/Edge →
            click the install icon in the address bar (or ⋮ menu → Install RetailPOS).

            ### What's new
            Built from commit ${{ github.sha }}
          files: android/app/build/outputs/apk/debug/*.apk
          generate_release_notes: false
